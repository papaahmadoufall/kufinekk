[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npx prisma migrate resolve --applied 20260401000000_init --schema apps/api/prisma/schema.prisma 2>/dev/null || true && npx prisma migrate deploy --schema apps/api/prisma/schema.prisma && node apps/api/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
